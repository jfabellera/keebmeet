name: Build

on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Nodejs
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm install

    # Build the shared + emails packages first so their declarations exist for
    # linting, type-checking, and the backend/frontend builds.
    - name: Build shared
      run: npm run build:shared

    - name: Build emails
      run: npm run build:emails

    - name: Lint
      run: npm run lint

    - name: Build backend
      run: npm run build -w api

    - name: Build frontend
      run: npm run build -w @keebmeet/frontend
