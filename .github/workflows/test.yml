name: Test

on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - '*'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Nodejs
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: .

      # Backend tests import @keebmeet/shared, so build it first.
      - name: Build shared
        run: npm run build:shared
        working-directory: .

      - name: Run tests
        run: npm run test:ci

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Backend tests
          path: backend/reports/junit.xml
          reporter: jest-junit

      - name: Upload test report artifact
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: test-report
          path: backend/reports/junit.xml
