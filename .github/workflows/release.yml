name: Release

on:
  push:
    branches:
      - 'main'
  workflow_dispatch: # allow manual runs from the Actions tab

env:
  REGISTRY: ghcr.io
  # Images are published as ghcr.io/<owner>/keebmeet-<backend|bot|web>.
  # github.repository_owner is lowercased for GHCR compatibility.
  OWNER: ${{ github.repository_owner }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push to GHCR with GITHUB_TOKEN
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # One image, three roles (API / Auth / Socket run it with different commands).
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/keebmeet-backend:latest
            ghcr.io/${{ env.OWNER }}/keebmeet-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push bot
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./bot/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/keebmeet-bot:latest
            ghcr.io/${{ env.OWNER }}/keebmeet-bot:${{ github.sha }}
          cache-from: type=gha,scope=bot
          cache-to: type=gha,mode=max,scope=bot

      # Self-hosted Iframely, built from a pinned upstream commit.
      - name: Build & push iframely
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./iframely/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/keebmeet-iframely:latest
            ghcr.io/${{ env.OWNER }}/keebmeet-iframely:${{ github.sha }}
          cache-from: type=gha,scope=iframely
          cache-to: type=gha,mode=max,scope=iframely

      # Vite inlines these PUBLIC URLs into the bundle at build time, so they must
      # be supplied here. Set them as repository Variables (Settings → Secrets and
      # variables → Actions → Variables). They are NOT secret — public URLs and a
      # public OAuth client id — so Variables, not Secrets, is correct.
      - name: Build & push web (frontend + Caddy)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_KEEBMEET_API_SERVER_URL=${{ vars.PUBLIC_API_URL }}
            VITE_KEEBMEET_AUTH_SERVER_URL=${{ vars.PUBLIC_AUTH_URL }}
            VITE_KEEBMEET_SOCKET_SERVER_URL=${{ vars.PUBLIC_SOCKET_URL }}
            VITE_KEEBMEET_APP_URL=${{ vars.PUBLIC_WEB_URL }}
            VITE_KEEBMEET_CDN_BASE_URL=${{ vars.PUBLIC_CDN_URL }}
            VITE_DISCORD_CLIENT_ID=${{ vars.DISCORD_CLIENT_ID }}
            VITE_DISCORD_REDIRECT_URI=${{ vars.DISCORD_REDIRECT_URI }}
          tags: |
            ghcr.io/${{ env.OWNER }}/keebmeet-web:latest
            ghcr.io/${{ env.OWNER }}/keebmeet-web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
